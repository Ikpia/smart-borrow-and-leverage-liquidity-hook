name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  foundry:
    runs-on: ubuntu-latest
    env:
      FOUNDRY_PROFILE: ci
      UNISWAP_V4_COMMIT: a7cf038cd568801a79a9b4cf92cd5b52c95c8585
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Bootstrap dependencies
        run: ./scripts/bootstrap.sh

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test

